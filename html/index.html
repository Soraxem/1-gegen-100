

<html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/lib/style.css">





<div class="container">

    <h1>1 Gegen 100</h1>

<button class="button">create new room</button>


<input type="text" name="room" placeholder="Room ID" class="textfield">
<button class="button" onclick="validate_correct_room()">join room</button>



</div>




</html>

<script>
    async function validate_correct_room() {
        let room = document.forms["join_room"]["room"].value;
        if (room == "") {
            alert("Please enter a room ID");
            return false;
        }
        
        let response = await fetch("/room/" + room + "/exists").then(response => response.text());
        alert(response);
        let exists = response === "true";

        if (!exists) {
            alert("Room does not exist");
            return false;
        }
    }
</script>
