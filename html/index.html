

<html>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <head>
        <title>1 Gegen 100</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rethink+Sans:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/lib/style.css">
    </head>

    <body>
        
        <div id="screen-login" class="screen">

            <h1 id="hero">1 gegen 100</h1>
            
            <div class="enter-code">
                <input type="text" id="room_id" placeholder="Room Name" class="input">
                <button id="sprk" class="button primary" onclick="join_room()">Join</button>
                <script src="lib/spark.js"></script>
            </div>
            
            <button class="button secondary" id="create-room" onclick="create_room()">Create Room</button>
            
        </div>

    </body>

</html>

<script>
    async function join_room() {
        let room = document.getElementById("room_id").value;
        if (room == "") {
            alert("Please enter a room name");
            return false;
        }
        
        let response = await fetch("/api/room/" + room + "/exists").then(response => response.text());
        let exists = response === "true";

        if (!exists) {
            alert("This room does not exist!");
            return false;
        } else {
            window.location.href = "/play/?room=" + room;
        }
    }

    async function create_room() {
        let room = document.getElementById("room_id").value;
        if (room == "") {
            alert("Please enter a room name");
        } else {
            window.location.href = "/room/?room=" + room;
        }
    }

</script>
