


<html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/lib/style.css">

    <head>
        <title>Play - 1 Gegen 100</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rethink+Sans:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/lib/style.css">
    </head>



<body>

    <div id="screen-question" class="screen">
        <h3>Frage</h3>
        <h2 id="question"></h2>
        <div class="answer-options">
            <button id="answer-1" class="answer button" onclick="answer(1)">A</button>
            <button id="answer-2" class="answer button" onclick="answer(2)">B</button>
            <button id="answer-3" class="answer button" onclick="answer(3)">C</button>
        </div>

        <p id="question-time"></p>
    </div>


    <div id="screen-correct" class="screen">
        <h2>Deine Antwort war richtig!</h2>
    </div>

    <div id="screen-in" class="screen">
        <h2>Du bist dabei!</h2>
    </div>

    <div id="screen-out" class="screen">
        <h2>Du bist leider draussen.</h2>
    </div>

    <div id="screen-you-got-selected" class="screen">
        <h2>Du spielst gegen alle!</h2>
    </div>

    <div id="screen-to-slow" class="screen">
        <h2>Du warst zu langsam.</h2>
    </div>

    <div id="screen-wrong" class="screen">
        <h2>Deine Antwort war falsch.</h2>
    </div>

    <div id="loading" class="screen">
        <div class="loader"></div>
    </div>

    <div id="screen-room" class="screen">
        <h2 id="room">Room</h2>
    </div>

    <div id="screen-nickname" class="screen">
        <h2 id="room-nick">Room</h2>
        <div class="enter-code">
            <input type="text" id="username" placeholder="Nickname" class="input">
            <button class="button primary" onclick="update_player()">Let's Go!</button>
        </div>
    </div>


</body>

</html>


<script src="/lib/player.js"></script>
