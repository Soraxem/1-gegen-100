


<html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/lib/style.css">





<div class="container">

    <nav>
        <a id="room">Room</a>
        <button>Game</button>
        <button>Nick</button>
        <button>Leave</button>
    </nav>

    <div id="content" >
        <input type="text" id="username" placeholder="Nickname" class="textfield">
        <button onclick="update_player()">join room</button>
    </div>

</div>



</html>


<script>

    async function update_player() {
        let username = document.getElementById("username").value;
        if (username == "") {
            alert("Please enter a Nickname");
            return false;
        }

        let response = await fetch("/api/player/set-username/" + username + "?room=" + room);
    }



    const urlParams = new URLSearchParams(window.location.search);
    const room = urlParams.get('room');

    document.getElementById("room").textContent = "Room: " + room;

    let es;
    let reconnectTimeout = 1000;

    function connect() {
        es = new EventSource("/api/room/" + room + "/player");
        es.addEventListener("error", (event) => {
            if (event.type === "error") {
                console.log("Connection dropped. Reconnecting... ");
                setTimeout(connect, reconnectTimeout);
            }
        });
        es.addEventListener("message", (event) => {
            const data = JSON.parse(event.data);
            console.log(data);
        });
    }

    connect();
</script>
