


<html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/lib/style.css">





<body>

    <div id="screen-question" class="screen">
        <p>Question/p>
    </div>


    <div id="screen-correct" class="screen">
        <h2>This Was correct</h2>
    </div>

    <div id="screen-in" class="screen">
        <h2>You are in</h2>
    </div>

    <div id="screen-out" class="screen">
        <h2>You are out</h2>
    </div>

    <div id="screen-you-got-selected" class="screen">
        <h2>You Got Selected</h2>
    </div>

    <div id="screen-to-slow" class="screen">
        <h2>You were too slow</h2>
    </div>

    <div id="screen-wrong" class="screen">
        <h2>This was wrong</h2>
    </div>

    <div id="screen-loading" class="screen">
        <p>loading...</p>
    </div>

    <div id="screen-room" class="screen">
        <a id="room">Room</a>

        <input type="text" id="username" placeholder="Nickname" class="textfield">
        <button onclick="update_player()">join room</button>
    </div>


</body>

</html>


<script src="/lib/player.js"></script>
