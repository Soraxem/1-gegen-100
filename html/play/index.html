


<html>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="/lib/style.css">

    <head>
        <title>Play - 1 Gegen 100</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rethink+Sans:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/lib/style.css">
    </head>



<div class="container">

    <nav>
        <a id="room">Room</a>
        <button>Game</button>
        <button>Nick</button>
        <button>Leave</button>
    </nav>

    <div id="content" >
        <input type="text" id="username" placeholder="Nickname" class="textfield">
        <button onclick="update_player()">join room</button>
    </div>

</div>



</html>


<script>

    async function update_player() {
        let username = document.getElementById("username").value;
        if (username == "") {
            alert("Please enter a Nickname");
            return false;
        }

        let response = await fetch("/api/player/set-username/" + username + "?room=" + room);
    }



    const urlParams = new URLSearchParams(window.location.search);
    const room = urlParams.get('room');

    document.getElementById("room").textContent = "Room: " + room;

    let es;

    function connect() {
        es = new EventSource("/api/room/" + room + "/player");
        es.addEventListener("message", (event) => {
            const data = JSON.parse(event.data);
            console.log(data);
        });
    }

    connect();
</script>
