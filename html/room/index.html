<html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <head>
        <title>1 Gegen 100 - Room</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rethink+Sans:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/lib/style.css">
    </head>

    <body>
        
        <div id="loading" class="screen">
            <p>loading...</p>
        </div>

        <div id="screen-room" class="screen">
            <h1 id="room">Room</h1>

            <ul id="users">
                
            </ul>

            <button class="button" onclick="start_round()">Start Round</button>
        </div>
        
        <div id="screen-player-selection" class="screen">
            <h1>Player Selection</h1>
            <div id="selected-player">Username</div>
            <button class="button" onclick="question()">Question</button>
        </div>
        
        <div id="screen-question" class="screen">
            <h2>Frage</h2>
            <div id="question-time"></div>
            <p id="question" >Wo wurde Jesus geboren?</p>
            <div class="answer-options">
                <p id="answer-0" class="answer">Nazareth</p>
                <p id="answer-1" class="answer">Bethlehem</p>
                <p id="answer-2" class="answer">Jerusalem</p>
                <script src="/lib/answer.js"></script>
            </div>
            <button class="button" onclick="evaluate_contestants()">Results</button>
        </div>

        <div id="screen-evaluate-contestants" class="screen">
            <h1>Results</h1>

            <ul id="contestants">
                
            </ul>

            <button class="button" onclick="evaluate_player()">Player Result</button>
        </div>

        <div id="screen-evaluate-player" class="screen">
            <h1>Question Result</h1>

            <p id="evaluated-question" >Wo wurde Jesus geboren?</p>
            <div class="answer-options">
                <p id="evaluated-answer-0" class="answer">Nazareth</p>
                <p id="evaluated-answer-1" class="answer">Bethlehem</p>
                <p id="evaluated-answer-2" class="answer">Jerusalem</p>
                <script src="/lib/answer.js"></script>
            </div>

            <button id="next-question" class="button" onclick="question()">Next Question</button>
            <button class="button" onclick="end_round()">End Round</button>
        </div>
        
    </body>

</html>

<template id="user-entry">
    <li class="user" id="user-id">Username</li>
</template>


<script src="/lib/room.js"></script>
