<html>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <head>
        <title>Room - 1 Gegen 100</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Rethink+Sans:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="/lib/style.css">
    </head>

    <body class="room">
        
        <div id="loading" class="screen">
            <div class="loader"></div>
        </div>

        <div id="screen-room" class="screen">
            <h1 id="room">Room</h1>

            <div id="users"></div>

            <button class="button" onclick="start_round()">Runde starten</button>
        </div>
        
        <div id="screen-player-selection" class="screen">
            <h1>Spieler Auswahl</h1>
            <div id="selected-player">Username</div>
            <button class="button" onclick="question()">Frage</button>
        </div>
        
        <div id="screen-question" class="screen">
            <div class="section-question">
                <h3>Frage</h3>
                <div id="question-time"></div>
                <p id="question" >Wo wurde Jesus geboren? Ich brauche mehr Text.</p>
            </div>
            <div class="answer-options">
                <p id="answer-0" class="answer">Nazareth</p>
                <p id="answer-1" class="answer">Bethlehem</p>
                <p id="answer-2" class="answer">Jerusalem</p>
            </div>
            <button class="button" onclick="evaluate_contestants()">Resultate</button>
        </div>

        <div id="screen-evaluate-contestants" class="screen">
            <h2>Resultate</h2>

            <div id="contestants">
                
            </div>

            <button class="button" onclick="evaluate_player()">Antwort</button>
        </div>

        <div id="screen-evaluate-player" class="screen">
            <h2>Antwort</h2>

            <p id="evaluated-question" >Wo wurde Jesus geboren?</p>
            <div class="answer-options">
                <p id="evaluated-answer-0" class="answer">Nazareth</p>
                <p id="evaluated-answer-1" class="answer">Bethlehem</p>
                <p id="evaluated-answer-2" class="answer">Jerusalem</p>
                <script src="/lib/answer.js"></script>
            </div>
            <div class="navigate-round">
                <button id="next-question" class="button" onclick="question()">Nächste Frage</button>
                <button class="button" onclick="end_round()">Runde beenden</button>
            </div>
            
        </div>
        
    </body>

</html>

<template id="user-entry">
    <div class="user-entry" id="user-id">
        <div class="user">Username</div>
        <div class="user-score">777</div>
    </div>
</template>


<script src="/lib/room.js"></script>
